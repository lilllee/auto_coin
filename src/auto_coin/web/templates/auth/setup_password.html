{% extends "base.html" %}
{% block title %}초기 설정 — auto_coin{% endblock %}
{% block body %}
<h1 class="text-xl font-semibold mb-2">초기 설정</h1>
<p class="text-sm text-slate-600 mb-4">관리자 패스워드를 설정하세요. 다음 단계에서 TOTP(OTP 앱)를 등록합니다.</p>
{% if error %}
<div class="mb-3 px-3 py-2 rounded bg-red-50 text-red-700 text-sm">{{ error }}</div>
{% endif %}
<form method="post" action="/setup" class="space-y-3">
  <input type="hidden" name="_csrf_token" value="{{ request.session.get('csrf_token', '') }}">
  <label class="block">
    <span class="block text-sm text-slate-600 mb-1">패스워드 (8자 이상)</span>
    <input type="password" name="password" minlength="8" required class="w-full border border-slate-300 rounded px-3 py-2 text-base">
  </label>
  <label class="block">
    <span class="block text-sm text-slate-600 mb-1">패스워드 확인</span>
    <input type="password" name="password_confirm" minlength="8" required class="w-full border border-slate-300 rounded px-3 py-2 text-base">
  </label>
  <button type="submit" class="btn w-full rounded bg-slate-900 text-white py-3">계속</button>
</form>
{% endblock %}
