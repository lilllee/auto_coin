{% extends "base.html" %}
{% block title %}{{ title }} — auto_coin{% endblock %}
{% block body %}
<a href="/reports" class="text-sm text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white">← 리포트 목록</a>
<h1 class="text-xl font-semibold my-3">{{ title }}</h1>
<div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded p-4 text-sm leading-relaxed markdown-body">
  {{ html | safe }}
</div>
<div class="text-xs text-slate-400 dark:text-slate-500 text-right mt-2 font-mono">{{ name }}</div>

<style>
  .markdown-body h1 { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
  .markdown-body h2 { font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; border-top: 1px solid #e2e8f0; padding-top: 0.5rem; }
  .markdown-body h3 { font-size: 1rem; font-weight: 600; margin-top: 0.75rem; margin-bottom: 0.25rem; }
  .markdown-body p { margin-bottom: 0.75rem; }
  .markdown-body ul { list-style: disc; padding-left: 1.25rem; margin-bottom: 0.75rem; }
  .markdown-body ol { list-style: decimal; padding-left: 1.25rem; margin-bottom: 0.75rem; }
  .markdown-body code { background: #f1f5f9; padding: 0.05rem 0.3rem; border-radius: 0.2rem; font-size: 0.85em; }
  .markdown-body pre { background: #0f172a; color: #e2e8f0; padding: 0.75rem; border-radius: 0.375rem; overflow-x: auto; font-size: 0.8rem; margin-bottom: 0.75rem; }
  .markdown-body pre code { background: transparent; padding: 0; color: inherit; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 0.75rem; font-size: 0.85rem; display: block; overflow-x: auto; }
  .markdown-body th, .markdown-body td { border: 1px solid #e2e8f0; padding: 0.35rem 0.5rem; text-align: left; }
  .markdown-body th { background: #f8fafc; font-weight: 600; }
  .markdown-body blockquote { border-left: 3px solid #cbd5e1; padding-left: 0.75rem; color: #475569; margin-bottom: 0.75rem; }
  .markdown-body a { color: #2563eb; text-decoration: underline; }
  .markdown-body hr { border: 0; border-top: 1px solid #e2e8f0; margin: 1rem 0; }
  .markdown-body strong { font-weight: 600; }

  .dark .markdown-body h2 { border-top-color: #334155; }
  .dark .markdown-body code { background: #334155; color: #e2e8f0; }
  .dark .markdown-body pre { background: #0f172a; }
  .dark .markdown-body th { background: #1e293b; color: #e2e8f0; }
  .dark .markdown-body th, .dark .markdown-body td { border-color: #334155; }
  .dark .markdown-body blockquote { border-left-color: #475569; color: #94a3b8; }
  .dark .markdown-body a { color: #60a5fa; }
  .dark .markdown-body hr { border-top-color: #334155; }
</style>
{% endblock %}
